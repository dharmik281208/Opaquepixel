name: Deploy OpaquePixel to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Locate, Install & Build Frontend
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Target frontend directory found: $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install
          chmod +x node_modules/.bin/* 2>/dev/null || true
          npx vite build
          mkdir -p $GITHUB_WORKSPACE/deploy_dist
          cp -r dist/* $GITHUB_WORKSPACE/deploy_dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_dist
